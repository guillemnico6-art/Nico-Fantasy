// ── POINTS ────────────────────────────────────────────────────────────────
function calcPts(pred,match){
  if(!pred||match.status!=="FINISHED")return null;
  const pH=+pred.home,pA=+pred.away;
  const rH=match.score?.fullTime?.home,rA=match.score?.fullTime?.away;
  if(rH==null||rA==null)return null;
  if(match.stage==="GROUP_STAGE"){
    if(pH===rH&&pA===rA)return 5;
    const pw=pH>pA?1:pH<pA?-1:0,rw=rH>rA?1:rH<rA?-1:0;
    return pw===rw?3:0;
  }
  const winner=match.score.winner,predW=pH>pA?"HOME_TEAM":"AWAY_TEAM";
  if(predW!==winner)return 0;
  const dur=match.score.duration;
  if(!dur||dur==="REGULAR"){const rH2=match.score.regularTime?.home??rH,rA2=match.score.regularTime?.away??rA;return(pH===rH2&&pA===rA2)?5:3;}
  return dur==="EXTRA_TIME"?2:1;
}
function userTotal(uid,users,preds,matches){
  const u=users.find(x=>x.id===uid);if(!u)return 0;
  let pts=0;
  for(const m of matches){const p=calcPts(preds[`${uid}_${m.id}`],m);if(p!==null)pts+=p;}
  if(u.champPick){const fin=matches.find(m=>m.stage==="FINAL"&&m.status==="FINISHED");if(fin){const win=fin.score.winner==="HOME_TEAM"?fin.homeTeam?.name:fin.awayTeam?.name;if(u.champPick===win)pts+=15;}}
  return pts;
}

// ── MATCH CARD ────────────────────────────────────────────────────────────
function MatchCard({match,pred,onSave}){
  const [h,setH]=useState(pred?.home?.toString()??"");
  const [a,setA]=useState(pred?.away?.toString()??"");
  const [saving,setSaving]=useState(false);const [flash,setFlash]=useState(false);
  const isKO=match.stage!=="GROUP_STAGE";const live=match.status==="IN_PLAY"||match.status==="PAUSED";
  const fin=match.status==="FINISHED";const gone=started(match.utcDate);const pts=calcPts(pred,match);
  const border=fin&&pred!=null?pts===5?"#F59E0B":pts>0?"#22C55E":"#F87171":live?"#EF4444":"#E5E7EB";
  const bg=fin&&pred!=null?pts===5?"#FFFBEB":pts>0?"#F0FDF4":"#FFF5F5":"white";
  const save=async()=>{
    if(h===""||a==="")return;
    if(isKO&&+h===+a){alert("En eliminatorias debe haber un ganador");return;}
    setSaving(true);await onSave(match.id,+h,+a);setSaving(false);setFlash(true);setTimeout(()=>setFlash(false),2500);
  };
  const hN=match.homeTeam?.shortName||match.homeTeam?.name||"?";
  const aN=match.awayTeam?.shortName||match.awayTeam?.name||"?";
  return(
    <div style={{border:`2px solid ${border}`,borderRadius:14,background:bg,padding:"0.9rem",marginBottom:"0.75rem",position:"relative"}}>
      {pts===5&&fin&&<div style={{position:"absolute",top:-10,right:12,background:"linear-gradient(135deg,#F59E0B,#D97706)",color:"white",fontSize:"0.65rem",fontWeight:900,padding:"0.2rem 0.6rem",borderRadius:999}}>⭐ EXACTO · 5pts</div>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.6rem"}}>
        <span style={{fontSize:"0.72rem",color:"#9CA3AF",fontWeight:600}}>{fDate(match.utcDate)} · {fTime(match.utcDate)}{match.group?` · ${match.group}`:""}</span>
        <span style={{fontSize:"0.68rem",fontWeight:800,padding:"0.18rem 0.55rem",borderRadius:999,background:live?"#EF4444":fin?"#6B7280":"#DBEAFE",color:live||fin?"white":"#1E40AF"}}>{live?"🔴 EN JUEGO":fin?"FINAL":"PRÓXIMO"}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
        <div style={{flex:1,textAlign:"right"}}><div style={{fontSize:"1.9rem"}}>{flag(match.homeTeam?.name)}</div><div style={{fontSize:"0.78rem",fontWeight:800,color:"#1F2937",marginTop:2}}>{hN}</div></div>
        <div style={{minWidth:130,textAlign:"center"}}>
          {gone?(
            <div>
              <div style={{fontSize:"1.7rem",fontWeight:900,color:"#111827",lineHeight:1}}>{fin||live?`${match.score?.fullTime?.home??"-"} - ${match.score?.fullTime?.away??"-"}`:"VS"}</div>
              {pred!=null?<div style={{fontSize:"0.7rem",color:"#6B7280",marginTop:4}}>Tu pred: {pred.home}-{pred.away}{pts!==null&&<span style={{marginLeft:4,fontWeight:900,color:pts===5?"#B45309":pts>0?"#15803D":"#DC2626"}}>({pts}pts)</span>}</div>:<div style={{fontSize:"0.68rem",color:"#9CA3AF",marginTop:4}}>Sin pronóstico</div>}
            </div>
          ):(
            <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}>

                  </div>
                  <div style={{fontSize:"0.75rem",color:"rgba(255,255,255,0.3)",paddingBottom:18}}>vs</div>
                  <div style={{flex:1,textAlign:"center"}}>

            {user.champPick?(

                  <FlagImg name={user.champPick} size={36}/>

                  <button onClick={onChampPick} style={{background:GOLD,color:"#1F2937",border:"none",borderRadius:8,padding:"6px 12px",fontWeight:800,fontSize:"0.75rem",cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>

function PredictionsTab({user,preds,matches,onSave}){
  const phases=useMemo(()=>STAGE_ORDER.filter(s=>matches.some(m=>m.stage===s)),[matches]);
  const [phase,setPhase]=useState(phases[0]||"GROUP_STAGE");const [day,setDay]=useState(1);
  const [filter,setFilter]=useState("all");
  const phaseMatches=useMemo(()=>matches.filter(m=>m.stage===phase).sort((a,b)=>new Date(a.utcDate)-new Date(b.utcDate)),[matches,phase]);
  const matchdays=useMemo(()=>phase==="GROUP_STAGE"?[...new Set(phaseMatches.map(m=>m.matchday))].sort((a,b)=>a-b):[],[phaseMatches,phase]);
  const byDay=useMemo(()=>phase==="GROUP_STAGE"?phaseMatches.filter(m=>m.matchday===day):phaseMatches,[phaseMatches,phase,day]);
  const shown=useMemo(()=>{
    switch(filter){
      case "pending": return byDay.filter(m=>!started(m.utcDate));
      case "played":  return byDay.filter(m=>started(m.utcDate));
      case "correct": return byDay.filter(m=>{const p=calcPts(preds[`${user.id}_${m.id}`],m);return p!==null&&p>0;});
      case "exact":   return byDay.filter(m=>calcPts(preds[`${user.id}_${m.id}`],m)===5);
      default:        return byDay;
    }
  },[byDay,filter,preds,user.id]);
  const filters=[["all","Todos"],["pending","Pendientes"],["played","Jugados"],["correct","✅ Acertados"],["exact","⭐ Exactos"]];
  return(
    <div>
      <div style={{background:"white",borderBottom:"2px solid #F3F4F6",padding:"0.6rem 1rem",overflowX:"auto",display:"flex",gap:6,position:"sticky",top:58,zIndex:8,scrollbarWidth:"none"}}>
        {phases.map(p=><button key={p} onClick={()=>{setPhase(p);setDay(1);}} style={{...btn,padding:"0.35rem 0.85rem",fontSize:"0.78rem",borderRadius:999,whiteSpace:"nowrap",background:phase===p?RED:"#F3F4F6",color:phase===p?"white":"#374151"}}>{STAGE_SHORT[p]}</button>)}
      </div>
      {phase==="GROUP_STAGE"&&matchdays.length>1&&(
        <div style={{background:"#F9FAFB",borderBottom:"1px solid #E5E7EB",padding:"0.45rem 1rem",display:"flex",gap:6,overflowX:"auto",scrollbarWidth:"none",position:"sticky",top:102,zIndex:7}}>
          {matchdays.map(d=><button key={d} onClick={()=>setDay(d)} style={{...btn,padding:"0.28rem 0.75rem",fontSize:"0.78rem",borderRadius:8,background:day===d?"#0A1628":"#E5E7EB",color:day===d?"white":"#374151"}}>Jornada {d}</button>)}
        </div>
      )}
      {/* Filter pills */}
      <div style={{background:"#F9FAFB",borderBottom:"1px solid #E5E7EB",padding:"0.45rem 1rem",display:"flex",gap:6,overflowX:"auto",scrollbarWidth:"none",position:"sticky",top:102,zIndex:7}}>
        {filters.map(([id,label])=>(
          <button key={id} onClick={()=>setFilter(id)} style={{...btn,padding:"0.28rem 0.75rem",fontSize:"0.75rem",borderRadius:999,whiteSpace:"nowrap",background:filter===id?"#0A1628":"#E5E7EB",color:filter===id?"white":"#374151"}}>
            {label}
          </button>
        ))}
      </div>
      <div style={{padding:"1rem",maxWidth:600,margin:"0 auto"}}>
        <h3 style={{fontFamily:"'Bebas Neue',cursive",fontSize:"1.4rem",color:"#0A1628",marginBottom:"0.75rem",letterSpacing:"0.06em"}}>{STAGE_FULL[phase]}{phase==="GROUP_STAGE"?` · Jornada ${day}`:""}</h3>
        {shown.length===0
          ?<div style={{textAlign:"center",color:"#9CA3AF",padding:"3rem 0",fontSize:"0.9rem"}}>
            {filter==="pending"?"Sin partidos pendientes 🎉":filter==="correct"?"Sin acertados todavía 😅":filter==="exact"?"Sin marcadores exactos todavía ⭐":"Sin partidos en esta fase todavía"}
          </div>
          :shown.map(m=><MatchCard key={m.id} match={m} pred={preds[`${user.id}_${m.id}`]} onSave={onSave}/>)}
      </div>
    </div>
  );
}

function LeaderboardTab({user,users,preds,matches,league}){
  const ranked=useMemo(()=>[...users].map(u=>{
    let match=0,exact=0,correct=0;
    for(const m of matches){const p=calcPts(preds[`${u.id}_${m.id}`],m);if(p!==null){match+=p;if(p===5)exact++;if(p>0)correct++;}}
    let champ=0;if(u.champPick){const fin=matches.find(m=>m.stage==="FINAL"&&m.status==="FINISHED");if(fin){const win=fin.score.winner==="HOME_TEAM"?fin.homeTeam?.name:fin.awayTeam?.name;if(u.champPick===win)champ=15;}}
    return{...u,pts:match+champ,exact,correct};
  }).sort((a,b)=>b.pts-a.pts||b.exact-a.exact),[users,preds,matches]);
  const medals=["🥇","🥈","🥉"];
  return(
    <div style={{padding:"1rem",maxWidth:600,margin:"0 auto"}}>
      <div style={{marginBottom:"1rem"}}><h2 style={{fontFamily:"'Bebas Neue',cursive",fontSize:"2rem",color:"#0A1628",letterSpacing:"0.06em",marginBottom:2}}>🏆 CLASIFICACIÓN</h2><div style={{fontSize:"0.82rem",color:"#6B7280",fontWeight:700}}>{league.emoji} {league.name}</div></div>
      <div style={{background:"white",borderRadius:16,border:"1px solid #E5E7EB",overflow:"hidden"}}>
        <div style={{background:"#0A1628",color:"white",display:"grid",gridTemplateColumns:"40px 1fr 40px 40px 55px",padding:"0.55rem 1rem",fontSize:"0.68rem",fontWeight:900,letterSpacing:"0.08em",textTransform:"uppercase",gap:6}}>
          <span>#</span><span>Jugador</span><span style={{textAlign:"center"}}>🏆</span><span style={{textAlign:"center"}}>⭐</span><span style={{textAlign:"right"}}>Pts</span>
        </div>
        {ranked.map((u,i)=>{const isMe=u.id===user.id;return(
          <div key={u.id} style={{display:"grid",gridTemplateColumns:"40px 1fr 40px 40px 55px",padding:"0.8rem 1rem",gap:6,alignItems:"center",background:isMe?"#FEF3C7":i===0?"#FFFBEB":i%2?"#F9FAFB":"white",borderBottom:i<ranked.length-1?"1px solid #F3F4F6":"none"}}>
            <span style={{fontWeight:900,fontSize:i<3?"1.2rem":"0.88rem",textAlign:"center"}}>{medals[i]||`${i+1}`}</span>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:"1.1rem"}}>{u.avatar||"🤖"}</span>
                <div>
                  <div style={{fontWeight:isMe?900:700,fontSize:"0.88rem"}}>{u.displayName||u.username}{isMe?" 👈":""}</div>
                  <div style={{fontSize:"0.68rem",color:"#9CA3AF"}}>{u.correct} correctos · {u.exact} exactos</div>
                </div>
              </div>
            <div style={{textAlign:"center",fontSize:"1.1rem"}}>{u.champPick?flag(u.champPick):"❓"}</div>
            <div style={{textAlign:"center",fontWeight:800,fontSize:"0.78rem",color:u.exact>0?"#B45309":"#6B7280"}}>{u.exact>0?`${u.exact}⭐`:"-"}</div>
            <div style={{textAlign:"right",fontFamily:"'Bebas Neue',cursive",fontSize:"1.65rem",color:isMe?"#B45309":"#0A1628"}}>{u.pts}</div>
          </div>
        );})}
      </div>
      <div style={{marginTop:"0.75rem",background:"#EFF6FF",borderRadius:12,padding:"0.7rem 1rem",fontSize:"0.72rem",color:"#1E40AF",fontWeight:700,lineHeight:1.6}}>📊 Grupos: ganador=3pts · exacto=5pts | Eliminatorias: 90'=3-5pts · prórroga=2pts · penaltis=1pt | Campeón=15pts</div>
      <button onClick={async()=>{
        const canvas=document.createElement("canvas");
        const W=720,headerH=190,rowH=84,padBottom=50;
        const H=headerH+ranked.length*rowH+padBottom;
        canvas.width=W;canvas.height=H;
        const ctx=canvas.getContext("2d");

        // Background
        const bgGrad=ctx.createLinearGradient(0,0,W,H);
        bgGrad.addColorStop(0,"#0A1628");bgGrad.addColorStop(1,"#1a3a5c");
        ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);

        // Header
        ctx.textAlign="center";
        ctx.font="900 30px Arial";ctx.fillStyle="#FFD700";
        ctx.fillText("🏆 NICO FANTASY",W/2,55);
        ctx.font="700 20px Arial";ctx.fillStyle="rgba(255,255,255,0.85)";
        ctx.fillText(`${league.emoji} ${league.name}`,W/2,90);
        ctx.strokeStyle="rgba(255,255,255,0.15)";ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(40,headerH-25);ctx.lineTo(W-40,headerH-25);ctx.stroke();

        // Rows
        const medals=["🥇","🥈","🥉"];
        ranked.forEach((u,i)=>{
          const y=headerH+i*rowH;
          const isFirst=i===0;
          // Row background
          ctx.fillStyle=isFirst?"rgba(255,215,0,0.12)":(i%2?"rgba(255,255,255,0.03)":"transparent");
          ctx.fillRect(20,y,W-40,rowH-8);
          // Rank/medal
          ctx.textAlign="left";ctx.font="700 30px Arial";
          ctx.fillStyle=isFirst?"#FFD700":"rgba(255,255,255,0.6)";
          ctx.fillText(medals[i]||`${i+1}°`,40,y+50);
          // Avatar
          ctx.font="32px Arial";
          ctx.fillText(u.avatar||"🤖",110,y+52);
          // Name
          ctx.font="700 24px Arial";ctx.fillStyle="white";
          ctx.fillText(u.displayName||u.username,165,y+38);
          // Sub info
          ctx.font="400 15px Arial";ctx.fillStyle="rgba(255,255,255,0.5)";
          ctx.fillText(`${u.correct} correctos · ${u.exact} exactos${u.champPick?" · 🏆 "+u.champPick:""}`,165,y+62);
          // Points
          ctx.textAlign="right";ctx.font="900 34px Arial";
          ctx.fillStyle=isFirst?"#FFD700":"white";
          ctx.fillText(`${u.pts}`,W-50,y+50);
          ctx.font="700 14px Arial";ctx.fillStyle="rgba(255,255,255,0.4)";
          ctx.fillText("PTS",W-50,y+68);
        });

        // Footer
        ctx.textAlign="center";ctx.font="700 16px Arial";ctx.fillStyle="rgba(255,255,255,0.4)";
        ctx.fillText("⚽ Mundial 2026 ⚽",W/2,H-20);

        canvas.toBlob(async(blob)=>{
          const file=new File([blob],"clasificacion.png",{type:"image/png"});
          if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
            try{
              await navigator.share({files:[file],title:"Clasificación Nico Fantasy",text:`${league.emoji} ${league.name}`});
            }catch(e){}
          }else{
            // Fallback: download image
            const url=URL.createObjectURL(blob);
            const a=document.createElement("a");
            a.href=url;a.download="clasificacion-nico-fantasy.png";
            document.body.appendChild(a);a.click();document.body.removeChild(a);
            URL.revokeObjectURL(url);
            alert("📸 Imagen descargada. Ábrela y compártela por WhatsApp.");
          }
        },"image/png");
      }} style={{...btn,width:"100%",marginTop:"0.75rem",background:"linear-gradient(135deg,#25D366,#1EA952)",color:"white",fontSize:"0.9rem",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        📸 Compartir clasificación (imagen)
      </button>
    </div>
  );
}

}

function App(){

  const [preds,setPreds]=useState({});
  const [matches,setMatches]=useState([]);
  const [results,setResults]=useState({}); // {matchId: {home,away,winner,duration}}
  const [tab,setTab]=useState("home");
  const [loginErr,setLoginErr]=useState("");
  const [loginBusy,setLoginBusy]=useState(false);
  const [showChamp,setShowChamp]=useState(false);

  // Matches with admin results overlaid — single source of truth for ALL tabs
  const matchesWithResults=useMemo(()=>matches.map(m=>{
    const r=results[m.id];
    if(!r)return m;
    return{...m,status:"FINISHED",score:{fullTime:{home:r.home,away:r.away},winner:r.winner,duration:r.duration||"REGULAR",regularTime:{home:r.home,away:r.away}}};
  }),[matches,results]);
  const [animTab,setAnimTab]=useState(null);
  const [animRefresh,setAnimRefresh]=useState(false);
  const [animHome,setAnimHome]=useState(false);

  const handleTabClick=(id)=>{
    setAnimTab(id);
    setTab(id);
    setTimeout(()=>setAnimTab(null),450);
  };
  const handleRefresh=()=>{
    setAnimRefresh(true);
    fetchMatches();
    setTimeout(()=>setAnimRefresh(false),600);
  };
  const handleHomeNav=()=>{
    setAnimHome(true);
    setTab("home");  // stay in league, just go to home tab
    setTimeout(()=>setAnimHome(false),500);
  };

  // League-specific storage keys
  const lk=k=>league?`nf_${league.id}_${k}`:k;

  useEffect(()=>{boot();},[]);

  async function boot(){
    let lgs=await db.get("nf_leagues");
    if(!lgs||!lgs.length){
      // Migrate existing data or create default league
      const defaultLeague={id:"default",name:"¿Dónde está la bolita? 😉",emoji:"⚽",createdAt:Date.now()};
      const oldUsers=await db.get("wc2026_users");
      if(oldUsers){
        await db.set("nf_default_users",oldUsers);
        const oldPreds=await db.get("wc2026_preds");
        if(oldPreds)await db.set("nf_default_preds",oldPreds);
      } else {
        const admin={id:"admin",username:"admin",displayName:"Admin",pwd:hashPwd("Mundial2026!"),isAdmin:true,champPick:null,createdAt:Date.now()};
        await db.set("nf_default_users",[admin]);
      }
      lgs=[defaultLeague];
      await db.set("nf_leagues",lgs);
    }
    setLeagues(lgs);
    // Always rebuild from hardcoded schedule + saved results
    await fetchMatches();
    // Load manually saved results (separate from match schedule)
    const savedRes=await db.get("nf_results")||{};
    setResults(savedRes);
    const splash=document.getElementById("splash");
    if(splash){splash.classList.add("hide");setTimeout(()=>splash.remove(),500);}
    setScreen("welcome");
  }

  async function fetchMatches(){
    // Always build from hardcoded schedule (never lose new phases)
    const fullSchedule=[...getHardcodedMatches(),...getKnockoutMatches(),...getRound16Matches()];
    // Apply any manually saved results from nf_results (admin entered scores)
    const savedRes=await db.get("nf_results")||{};
    const merged=fullSchedule.map(m=>{
      const r=savedRes[m.id];
      if(!r)return m;
      return{...m,status:"FINISHED",score:{fullTime:{home:r.home,away:r.away},winner:r.winner,duration:r.duration||"REGULAR",regularTime:{home:r.home,away:r.away}}};
    });
    setMatches(merged);
    await db.set("nf_matches",merged);
    await db.set("nf_match_t",Date.now());
  }

  async function selectLeague(lg){
    setLeague(lg);setLoginErr("");setScreen("login");
  }

  async function createLeague(name,emoji,adminUser,adminPwd){
    const id=randId();
    const newLeague={id,name,emoji,createdAt:Date.now()};
    const admin={id:"admin_"+id,username:adminUser,displayName:adminUser,pwd:hashPwd(adminPwd),isAdmin:true,champPick:null,createdAt:Date.now()};
    await db.set(`nf_${id}_users`,[admin]);
    await db.set(`nf_${id}_preds`,{});
    const updated=[...leagues,newLeague];
    await db.set("nf_leagues",updated);
    setLeagues(updated);
    setShowCreateLeague(false);
    alert(`✅ Liga "${name}" creada. El admin es "${adminUser}".`);
  }

  // Champion pick locks at a fixed deadline: today 21:00 (hora España)
  const [tournamentStarted,setTournamentStarted]=useState(started(CHAMP_LOCK_DEADLINE));
  useEffect(()=>{
    if(tournamentStarted)return;
    const msLeft=new Date(CHAMP_LOCK_DEADLINE)-new Date();
    if(msLeft<=0){setTournamentStarted(true);return;}
    const t=setTimeout(()=>setTournamentStarted(true),msLeft);
    return()=>clearTimeout(t);
  },[tournamentStarted]);

  async function login(username,password){
    setLoginBusy(true);setLoginErr("");
    const all=await db.get(lk("users"))||[];
    const found=all.find(u=>u.username.toLowerCase()===username.toLowerCase()&&u.pwd===hashPwd(password));
    setLoginBusy(false);
    if(!found)return setLoginErr("Usuario o contraseña incorrectos");
    setUser(found);setUsers(all);
    setPreds(await db.get(lk("preds"))||{});
    setScreen("app");setTab("home");
    if(!found.champPick&&!tournamentStarted)setShowChamp(true);
  }

  function pickChamp(teamName){
    // Optimistic: close modal and update UI instantly, save in background
    setShowChamp(false);
    const all=[...users];const idx=all.findIndex(u=>u.id===user.id);if(idx===-1)return;
    all[idx].champPick=teamName;setUsers(all);setUser(u=>({...u,champPick:teamName}));
    db.set(lk("users"),all);
  }

  async function savePred(matchId,home,away){
    const key=`${user.id}_${matchId}`;const np={...preds,[key]:{home,away,ts:Date.now()}};
    setPreds(np);await db.set(lk("preds"),np);
  }

  async function updatePwd(oldP,newP,cb){
    const all=[...users];const idx=all.findIndex(u=>u.id===user.id);
    if(idx===-1||all[idx].pwd!==hashPwd(oldP))return cb(false);
    all[idx].pwd=hashPwd(newP);setUsers(all);await db.set(lk("users"),all);cb(true);
  }

  async function createUser(username,displayName,password,cb){
    const all=[...users];
    if(all.find(u=>u.username.toLowerCase()===username.toLowerCase()))return cb(false);
    all.push({id:randId(),username,displayName,pwd:hashPwd(password),pwdHint:password,isAdmin:false,champPick:null,createdAt:Date.now()});
    setUsers(all);await db.set(lk("users"),all);cb(true);
  }

  async function resetPwd(uid,pwd){
    const all=[...users];const idx=all.findIndex(u=>u.id===uid);if(idx===-1)return;
    all[idx].pwd=hashPwd(pwd);all[idx].pwdHint=pwd;
    setUsers(all);await db.set(lk("users"),all);
  }

  async function updateAvatar(avatar){
    const all=[...users];const idx=all.findIndex(u=>u.id===user.id);if(idx===-1)return;
    all[idx].avatar=avatar;
    setUsers(all);setUser(u=>({...u,avatar}));
    await db.set(lk("users"),all);
  }

  async function deleteLeague(leagueId){
    // Remove from leagues list
    const updated=leagues.filter(l=>l.id!==leagueId);
    await db.set("nf_leagues",updated);
    setLeagues(updated);
    // Delete league data from Firebase
    try{ await rtdb.ref(`nf_${leagueId}_users`).remove(); }catch{}
    try{ await rtdb.ref(`nf_${leagueId}_preds`).remove(); }catch{}
    // Go back to welcome screen
    setScreen("welcome");
    setUser(null);
    setLeague(null);
  }

  async function saveResult(matchId,home,away,duration="REGULAR",penaltyWinner=null){
    // For PENALTIES: use penaltyWinner (HOME_TEAM or AWAY_TEAM) since 90min score is a draw
    const winner=penaltyWinner||(home>away?"HOME_TEAM":home<away?"AWAY_TEAM":"DRAW");
    // 1. Save to nf_results (dedicated results store - never overwritten)
    const updatedRes={...results,[matchId]:{home,away,winner,duration}};
    setResults(updatedRes);
    await db.set("nf_results",updatedRes);
    // 2. Also update nf_matches so merge logic works if app reloads
    const updatedMatches=matches.map(m=>{
      if(m.id!==matchId)return m;
      return{...m,status:"FINISHED",score:{fullTime:{home,away},winner,duration,regularTime:{home,away}}};
    });
    setMatches(updatedMatches);
    await db.set("nf_matches",updatedMatches);
    await db.set("nf_match_t",Date.now());
  }

  if(screen==="loading")return null;

  if(screen==="welcome")return(
    <>
      {showCreateLeague&&<CreateLeagueModal onSave={createLeague} onClose={()=>setShowCreateLeague(false)}/>}
      <WelcomeScreen leagues={leagues} onSelect={selectLeague} onCreateLeague={()=>setShowCreateLeague(true)}/>
    </>
  );

  if(screen==="login")return <LoginScreen league={league} onLogin={login} onBack={()=>setScreen("welcome")} error={loginErr} busy={loginBusy}/>;

  const TABS=[{id:"home",icon:"🏠",label:"Inicio"},{id:"predictions",icon:"⚽",label:"Pronósticos"},{id:"leaderboard",icon:"🏆",label:"Tabla"},{id:"profile",icon:"👤",label:"Perfil"},...(user?.isAdmin?[{id:"admin",icon:"👑",label:"Admin"}]:[])];

  return(
    <div className="fade-in" style={{minHeight:"100vh",background:"#F3F4F6",paddingBottom:"calc(72px + env(safe-area-inset-bottom,0px))"}}>
      {showChamp&&<ChampionModal onPick={pickChamp}/>}
      <div style={{background:NAVY,color:"white",padding:"0.7rem 1rem",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10,boxShadow:"0 2px 16px rgba(0,0,0,0.35)"}}>
        <div>
          <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:"1.2rem",color:GOLD,letterSpacing:"0.1em",lineHeight:1}}>{APP_NAME}</div>
          <div style={{fontSize:"0.6rem",opacity:0.6,fontWeight:600}}>{league?.emoji} {league?.name}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={handleRefresh} title="Actualizar" style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:8,color:"white",padding:"0.28rem 0.6rem",fontSize:"0.85rem",cursor:"pointer",overflow:"hidden",position:"relative"}}>
                  <span className={animRefresh?"spin-once":""} style={{display:"inline-block"}}>🔄</span>
                </button>
          <button onClick={handleHomeNav} title="Cambiar liga" style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:8,color:"white",padding:"0.28rem 0.6rem",fontSize:"0.85rem",cursor:"pointer"}}>
                  <span className={animHome?"home-jump":""} style={{display:"inline-block"}}>🏠</span>
                </button>
          <div>
            <div style={{fontWeight:800,fontSize:"0.85rem",textAlign:"right"}}>{user?.displayName||user?.username}</div>
            <button onClick={()=>{setScreen("welcome");setUser(null);}} style={{background:"none",border:"none",color:"rgba(255,255,255,0.5)",fontSize:"0.68rem",cursor:"pointer",padding:0,fontFamily:"'Nunito',sans-serif",display:"block",textAlign:"right"}}>Salir →</button>
          </div>
        </div>
      </div>
      <div style={{paddingTop:4}}>
        {tab==="home"&&<HomeTab user={user} users={users} preds={preds} matches={matchesWithResults} onChampPick={()=>setShowChamp(true)} tournamentStarted={tournamentStarted} league={league}/>}
        {tab==="predictions"&&<PredictionsTab user={user} preds={preds} matches={matchesWithResults} onSave={savePred}/>}
        {tab==="leaderboard"&&<LeaderboardTab user={user} users={users} preds={preds} matches={matchesWithResults} league={league}/>}
        {tab==="profile"&&<ProfileTab user={user} onUpdatePwd={updatePwd} onUpdateAvatar={updateAvatar} onChampPick={()=>setShowChamp(true)} tournamentStarted={tournamentStarted} league={league}/>}
        {tab==="admin"&&user?.isAdmin&&<AdminTab users={users} preds={preds} matches={matchesWithResults} onCreateUser={createUser} onResetPwd={resetPwd} onSaveResult={saveResult} onDeleteLeague={deleteLeague} league={league}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"white",borderTop:"1px solid #E5E7EB",display:"flex",zIndex:9999,boxShadow:"0 -4px 12px rgba(0,0,0,0.08)",WebkitTransform:"translateZ(0)",transform:"translateZ(0)",paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>handleTabClick(t.id)} style={{flex:1,border:"none",background:"none",padding:"0.6rem 0.25rem",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"0.2rem",color:tab===t.id?"#C41E3A":"#9CA3AF",fontFamily:"'Nunito',sans-serif",position:"relative",overflow:"hidden"}}>
            {tab===t.id&&<div style={{position:"absolute",inset:0,background:"rgba(196,30,58,0.06)",borderRadius:8}}/>}
            <span className={animTab===t.id?"tab-bounce":""} style={{fontSize:"1.3rem",display:"inline-block",transformOrigin:"center bottom"}}>{t.icon}</span>
            <span style={{fontSize:"0.62rem",fontWeight:tab===t.id?900:600,transition:"font-weight 0.15s"}}>{t.label}</span>
            {tab===t.id&&<div style={{position:"absolute",bottom:2,width:20,height:3,background:"#C41E3A",borderRadius:999}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
