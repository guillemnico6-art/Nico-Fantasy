// ── POINTS ─────────────────────────────────────────────────────────────────
function calcPts(pred,match){
  if(!pred||match.status!=="FINISHED")return null;
  const pH=+pred.home,pA=+pred.away;
  const rH=match.score?.fullTime?.home,rA=match.score?.fullTime?.away;
  if(rH==null||rA==null)return null;
  if(match.stage==="GROUP_STAGE"){
    if(pH===rH&&pA===rA)return 5;
    const pw=pH>pA?1:pH<pA?-1:0,rw=rH>rA?1:rH<rA?-1:0;
    return pw===rw?3:0;
  }
  const winner=match.score.winner,predW=pH>pA?"HOME_TEAM":"AWAY_TEAM";
  if(predW!==winner)return 0;
  const dur=match.score.duration;
  if(!dur||dur==="REGULAR"){const rH2=match.score.regularTime?.home??rH,rA2=match.score.regularTime?.away??rA;return(pH===rH2&&pA===rA2)?5:3;}
  return dur==="EXTRA_TIME"?2:1;
}
function userTotal(uid,users,preds,matches){
  const u=users.find(x=>x.id===uid);if(!u)return 0;
  let pts=0;
  for(const m of matches){const p=calcPts(preds[`${uid}_${m.id}`],m);if(p!==null)pts+=p;}
  if(u.champPick){const fin=matches.find(m=>m.stage==="FINAL"&&m.status==="FINISHED");if(fin){const win=fin.score.winner==="HOME_TEAM"?fin.homeTeam?.name:fin.awayTeam?.name;if(u.champPick===win)pts+=15;}}
  return pts;
}

  async function fetchMatches(){
    // Try API first, fall back to hardcoded schedule
    try{
      const r=await fetch(`${WC_API}/matches`,{headers:{"X-Auth-Token":API_KEY}});
      if(!r.ok)throw new Error(`${r.status}`);
      const d=await r.json();
      const ms=d.matches||[];
      if(ms.length>0){
        setMatches(ms);await db.set("wc2026_matches",ms);await db.set("wc2026_match_t",Date.now());
        return;
      }
    }catch(e){console.error("API not available, using hardcoded schedule");}
    // Use hardcoded schedule
    const ms=getHardcodedMatches();
    setMatches(ms);
    await db.set("wc2026_matches",ms);
    await db.set("wc2026_match_t",Date.now());
  }

  const tournamentStarted=useMemo(()=>{const first=matches.find(m=>m.stage==="GROUP_STAGE");return first?started(first.utcDate):false;},[matches]);

  function login(username,password){
    setLoginBusy(true);setLoginErr("");
    const found=users.find(u=>u.username.toLowerCase()===username.toLowerCase()&&u.pwd===hashPwd(password));
    setLoginBusy(false);
    if(!found)return setLoginErr("Usuario o contraseña incorrectos");
    setUser(found);setScreen("app");setTab("home");
    if(!found.champPick&&!tournamentStarted)setShowChamp(true);
  }

  async function pickChamp(teamName){
    const all=[...users];const idx=all.findIndex(u=>u.id===user.id);if(idx===-1)return;
    all[idx].champPick=teamName;setUsers(all);setUser(u=>({...u,champPick:teamName}));
    await db.set("wc2026_users",all);setShowChamp(false);
  }

  async function savePred(matchId,home,away){
    const key=`${user.id}_${matchId}`;const np={...preds,[key]:{home,away,ts:Date.now()}};
    setPreds(np);await db.set("wc2026_preds",np);
  }

  async function updatePwd(oldP,newP,cb){
    const all=[...users];const idx=all.findIndex(u=>u.id===user.id);
    if(idx===-1||all[idx].pwd!==hashPwd(oldP))return cb(false);
    all[idx].pwd=hashPwd(newP);setUsers(all);await db.set("wc2026_users",all);cb(true);
  }

  async function createUser(username,displayName,password,cb){
    const all=[...users];
    if(all.find(u=>u.username.toLowerCase()===username.toLowerCase()))return cb(false);
    all.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),username,displayName,pwd:hashPwd(password),isAdmin:false,champPick:null,createdAt:Date.now()});
    setUsers(all);await db.set("wc2026_users",all);cb(true);
  }

  async function resetPwd(uid,pwd){
    const all=[...users];const idx=all.findIndex(u=>u.id===uid);if(idx===-1)return;
    all[idx].pwd=hashPwd(pwd);setUsers(all);await db.set("wc2026_users",all);
  }

  if(screen==="loading")return null;
  if(screen==="login")return <LoginScreen onLogin={login} error={loginErr} busy={loginBusy}/>;

  const TABS=[{id:"home",icon:"🏠",label:"Inicio"},{id:"predictions",icon:"⚽",label:"Pronósticos"},{id:"leaderboard",icon:"🏆",label:"Tabla"},{id:"profile",icon:"👤",label:"Perfil"},...(user?.isAdmin?[{id:"admin",icon:"👑",label:"Admin"}]:[])];

  return(
    <div style={{minHeight:"100vh",background:"#F3F4F6",paddingBottom:72}}>
      {showChamp&&<ChampionModal onPick={pickChamp}/>}
      <div style={{background:NAVY,color:"white",padding:"0.7rem 1rem",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10,boxShadow:"0 2px 16px rgba(0,0,0,0.35)"}}>
        <div><div style={{fontFamily:"'Bebas Neue',cursive",fontSize:"1.35rem",color:GOLD,letterSpacing:"0.1em",lineHeight:1}}>{APP_NAME}</div><div style={{fontSize:"0.62rem",opacity:0.55,fontWeight:600,letterSpacing:"0.08em"}}>{LIGA_NAME}</div></div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={fetchMatches} title="Actualizar partidos" style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:8,color:"white",padding:"0.28rem 0.6rem",fontSize:"0.85rem",cursor:"pointer"}}>🔄</button>
          <div><div style={{fontWeight:800,fontSize:"0.85rem",textAlign:"right"}}>{user?.displayName||user?.username}</div><button onClick={()=>{setScreen("login");setUser(null);}} style={{background:"none",border:"none",color:"rgba(255,255,255,0.5)",fontSize:"0.68rem",cursor:"pointer",padding:0,fontFamily:"'Nunito',sans-serif",display:"block",textAlign:"right"}}>Salir →</button></div>
        </div>
      </div>
      <div style={{paddingTop:4}}>
        {tab==="home"&&<HomeTab user={user} users={users} preds={preds} matches={matches} onChampPick={()=>setShowChamp(true)} tournamentStarted={tournamentStarted}/>}
        {tab==="predictions"&&<PredictionsTab user={user} preds={preds} matches={matches} onSave={savePred}/>}
        {tab==="leaderboard"&&<LeaderboardTab user={user} users={users} preds={preds} matches={matches}/>}
        {tab==="profile"&&<ProfileTab user={user} onUpdatePwd={updatePwd} onChampPick={()=>setShowChamp(true)} tournamentStarted={tournamentStarted}/>}
        {tab==="admin"&&user?.isAdmin&&<AdminTab users={users} preds={preds} matches={matches} onCreateUser={createUser} onResetPwd={resetPwd}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"white",borderTop:"1px solid #E5E7EB",display:"flex",zIndex:20,boxShadow:"0 -4px 12px rgba(0,0,0,0.08)"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,border:"none",background:"none",padding:"0.6rem 0.25rem",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"0.2rem",color:tab===t.id?"#C41E3A":"#9CA3AF",fontFamily:"'Nunito',sans-serif",transition:"color .15s"}}>
            <span style={{fontSize:"1.3rem"}}>{t.icon}</span>
            <span style={{fontSize:"0.62rem",fontWeight:tab===t.id?900:600}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
